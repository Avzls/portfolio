# Full-stack production stack: MySQL + Go API + Next.js web.
# Copy .env.example to .env and fill in real values before running:
#   docker compose up -d --build

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Not exposed to host by default; only the api talks to it.

  api:
    build:
      context: ./go-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8081"
      UPLOAD_DIR: /app/uploads
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8081:8081"

  web:
    build:
      context: ./nextjs
      args:
        # Public URL where the browser reaches the API (baked at build time).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  db_data:
  uploads_data:
