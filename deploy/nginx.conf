# Nginx reverse proxy for Porto (single domain).
# Install to: /etc/nginx/sites-available/porto  then symlink into sites-enabled.
# Replace porto.example.com with your real domain.
#
# After getting it working on HTTP, run:
#   sudo certbot --nginx -d porto.example.com
# Certbot will rewrite this file to add the TLS (443) block automatically.

server {
    listen 80;
    server_name porto.example.com;

    # Max upload size (matches image/PDF uploads via admin).
    client_max_body_size 20M;

    # --- API: everything under /api goes to the Go backend ---
    location /api/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Uploaded files served by the Go backend ---
    location /uploads/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_set_header   Host $host;
    }

    # --- Health check passthrough (optional) ---
    location = /health {
        proxy_pass http://127.0.0.1:8081;
    }

    # --- Everything else: the Next.js frontend ---
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
